name: Deploy OpenAPI docs to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install VitePress and OpenAPI plugin
        run: |
          npm init -y
          npm install vitepress vitepress-openapi

      - name: Create VitePress config
        run: |
          mkdir -p docs/.vitepress/theme
          
          # Конфигурация VitePress
          cat > docs/.vitepress/config.mts << 'EOF'
          import { defineConfig } from 'vitepress'
          
          export default defineConfig({
            title: 'My API Documentation',
            description: 'API Reference',
            base: '/${GITHUB_REPOSITORY#*/}/',
            themeConfig: {
              nav: [
                { text: 'Home', link: '/' },
                { text: 'API', link: '/api/' }
              ],
              sidebar: [
                { text: 'Getting Started', link: '/' },
                { text: 'API Reference', link: '/api/' }
              ]
            }
          })
          EOF
          
          # Расширение темы для OpenAPI
          cat > docs/.vitepress/theme/index.ts << 'EOF'
          import DefaultTheme from 'vitepress/theme'
          import 'vitepress-openapi/dist/style.css'
          import { enhanceAppWithOpenapi } from 'vitepress-openapi'
          
          export default {
            ...DefaultTheme,
            enhanceApp(ctx) {
              enhanceAppWithOpenapi(ctx)
              DefaultTheme.enhanceApp?.(ctx)
            }
          }
          EOF

      - name: Create homepage
        run: |
          cat > docs/index.md << 'EOF'
          # API Documentation
          
          Welcome to the API documentation.
          
          ## Quick links
          
          - [API Reference](/api/)
          EOF

      - name: Create OpenAPI page
        run: |
          mkdir -p docs/api
          cat > docs/api/index.md << 'EOF'
          # API Reference
          
          <OASpec spec-url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/openapi.yaml" />
          EOF

      - name: Build
        run: npx vitepress build docs --base /${GITHUB_REPOSITORY#*/}/
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
