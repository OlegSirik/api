      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PolicyStatus'
 

    'Http-200':
      description: OK.
 
    'Http-202':
      description: Операция начата, но не завершена к таймауту. Статус выполнения можно запросить позже.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpAccepted'
          example:
            href: "http://.../v2/operations?id=214123412341223"
            method: "GET"
 
    'Http-204':
      description: OK. No content. Response after deleting resource
 
    'Http-400':
      description: Bad Request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpBadResponse'
 
    'Http-401':
      description: Unauthorized (JWT not valid).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpBadResponse'
 
    'Http-404':
      description: Данные не найдены.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpBadResponse'
          example:
            errorCode: ERR-00005
            errorDescription: Данные не найдены.
 
    'Http-503':
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpBadResponse'
          x-example:
            errorCode: ERR-00105
            errorDescription: сервер недоступен
